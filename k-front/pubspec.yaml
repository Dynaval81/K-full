name: knoty
description: "Knoty — Bildungs-Messenger für Schüler in Deutschland."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^13.2.0
  provider: ^6.1.1
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  qr_flutter: ^4.1.0
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0F0F0F"
  image: assets/images/knoty_logo.png
  image_dark: assets/images/knoty_logo_bt.png
  branding: assets/images/Canons.png
  branding_dark: assets/images/Canons.png
  branding_mode: bottom
  android_12:
    image: assets/images/knoty_logo.png
    color: "#FFFFFF"
    image_dark: assets/images/knoty_logo_bt.png
    color_dark: "#0F0F0F"
    branding: assets/images/Canons.png
    branding_dark: assets/images/Canons.png
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/knoty_logo_nt.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/knoty_logo_nt.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/emojis_v2/
    - assets/emojis/